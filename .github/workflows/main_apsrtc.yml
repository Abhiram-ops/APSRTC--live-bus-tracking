name: Deploy APSRTC to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: apsrtc-tracker-1122
  PYTHON_VERSION: '3.11'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Copy requirements.txt into Backend folder so it deploys with the code
      - name: Prepare deployment package
        run: |
          cp requirements.txt Backend/
          cp startup.sh Backend/ || true
          cp Procfile Backend/ || true

      # Zip ONLY the source code — NO pre-built venv
      # Azure will run pip install itself using Oryx build system
      - name: Zip source code only
        run: |
          cd Backend
          zip -r ../release.zip . \
            -x "*.pyc" \
            -x "__pycache__/*" \
            -x "venv/*" \
            -x "venv2/*" \
            -x "antenv/*" \
            -x ".venv/*" \
            -x "*.db" \
            -x "instance/*"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip
